# Promtail configuration — ships HoneyStrike container logs to Loki.
#
# Drop into `/etc/promtail/config.yml` on the host running the honeypot
# stack. Promtail scrapes Docker container stdout/stderr via the Docker
# daemon's log files; container_name → Loki label so it's queryable as
# `{container="honeystrike-fingerprint"}`.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: honeystrike-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
        filters:
          # Only honeypot-platform containers — skip Caddy and DB chatter.
          - name: name
            values:
              - honeystrike-ssh
              - honeystrike-http
              - honeystrike-ftp
              - honeystrike-rdp
              - honeystrike-fingerprint
              - honeystrike-alerting
              - honeystrike-reports
              - honeystrike-api
              - honeystrike-cache
              - honeystrike-db

    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"

    pipeline_stages:
      # Honeystrike apps emit structlog ConsoleRenderer in dev and JSONRenderer
      # in prod. Try to parse JSON first; fall back to the raw line.
      - json:
          expressions:
            timestamp: "timestamp"
            level: "level"
            event: "event"
            session_id: "session_id"
            src_ip: "src_ip"
            severity: "severity"
            threat_score: "threat_score"
      - labels:
          level:
          event:
          severity:
      # Drop verbose request-log noise that doesn't add operational value.
      - match:
          selector: '{event="api.request"} |= "/api/health"'
          action: drop
          drop_counter_reason: noisy_health_check
