# Grafana dashboard provisioning — auto-imports honeystrike-overview.json.

apiVersion: 1

providers:
  - name: HoneyStrike
    orgId: 1
    folder: HoneyStrike
    type: file
    disableDeletion: false
    updateIntervalSeconds: 60
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
