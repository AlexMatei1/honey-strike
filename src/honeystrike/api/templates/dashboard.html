{% extends "_base.html" %}
{% block title %}Live attacks — HoneyStrike{% endblock %}
{% block head %}
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="" defer></script>
{% endblock %}
{% block content %}
  <section class="overview" id="overview">
    <div class="stat"><span class="label">Sessions (24h)</span><span class="value" data-key="total_sessions">—</span></div>
    <div class="stat"><span class="label">Unique IPs</span><span class="value" data-key="unique_ips">—</span></div>
    <div class="stat"><span class="label">Avg score</span><span class="value" data-key="avg_threat_score">—</span></div>
    <div class="stat"><span class="label">Critical</span><span class="value" data-key="severity_critical">—</span></div>
  </section>

  <section class="grid">
    <div id="map" class="map"></div>
    <aside class="sidebar">
      <h2>Recent sessions</h2>
      <table class="sessions">
        <thead>
          <tr><th>Time</th><th>Service</th><th>IP</th><th>Score</th></tr>
        </thead>
        <tbody id="sessions-tbody"></tbody>
      </table>
    </aside>
  </section>
{% endblock %}
{% block scripts %}
  <script src="/static/dashboard.js"></script>
{% endblock %}
