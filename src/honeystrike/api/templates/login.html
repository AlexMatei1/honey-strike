<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — HoneyStrike</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="login-body">
  <form id="login-form" class="login-card" autocomplete="off">
    <h1>HoneyStrike</h1>
    <p class="muted">Sign in to the dashboard</p>
    <label>Username
      <input type="text" name="username" required autofocus>
    </label>
    <label>Password
      <input type="password" name="password" required>
    </label>
    <button type="submit">Sign in</button>
    <p id="login-error" class="error" hidden></p>
  </form>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const err = document.getElementById('login-error');
      err.hidden = true;
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: fd.get('username'), password: fd.get('password') }),
          credentials: 'include',
        });
        if (!r.ok) {
          err.textContent = 'Invalid credentials.';
          err.hidden = false;
          return;
        }
        const data = await r.json();
        sessionStorage.setItem('hs_access_token', data.access_token);
        window.location.href = '/';
      } catch (ex) {
        err.textContent = 'Login failed: ' + ex.message;
        err.hidden = false;
      }
    });
  </script>
</body>
</html>
