id = "detect-password-guess"
family = "defend"
title = "Detect SSH password guessing (T1110.001)"
blurb = "Write the trigger condition that fires after the 6th failed SSH login."
ttps = ["T1110.001"]
difficulty = "easy"
typing_model = "python"

briefing = """
**MITRE ATT&CK:** T1110.001 — *Brute Force: Password Guessing*

A genuine SSH user who forgot their password tries 2–3 times and stops.
A brute-force tool tries hundreds. We use that gap as a detection
threshold: **more than 5 auth attempts in one session = T1110.001**.

The rule lives at
[`_password_guessing_rule`](src/honeystrike/workers/intel/ttp_rules.py:169).
It runs once per session at fingerprint time, against a `SessionContext`
that exposes events as a list and a `payloads(EventType.X)` helper that
filters to one event type.

You'll type the rule body. The fixture session below has 7
`SSH_AUTH_ATTEMPT` events — enough to fire.
"""

reference_source_excerpt = """
def _password_guessing_rule(ctx: SessionContext) -> TTPMatch | None:
    auth_events: list[dict[str, Any]] = []
    if ctx.service == "ssh":
        auth_events = ctx.payloads(EventType.SSH_AUTH_ATTEMPT)
    elif ctx.service == "ftp":
        auth_events = [
            p for p in ctx.payloads(EventType.FTP_COMMAND)
            if p.get("command", "").upper() == "PASS"
        ]
    if len(auth_events) <= 5:
        return None
    return TTPMatch(
        technique_id="T1110.001",
        ...
    )
"""

[fixture]
events_json = "ssh-passwd-guess"
expected = true

[[blocks]]
kind = "prose"
text = "We collect every auth-attempt payload, then check the threshold. For SSH that's SSH_AUTH_ATTEMPT; for FTP we filter FTP_COMMAND down to the PASS commands."

[[blocks]]
kind = "code"
target = "auth_events: list[dict[str, Any]] = []"
annotation = "Start empty so we have something to fall through to when the service isn't ssh or ftp."

[[blocks]]
kind = "code"
target = "if ctx.service == \"ssh\":"
annotation = "Branch on the session's service. The same rule covers both SSH and FTP brute force."

[[blocks]]
kind = "code"
target = "    auth_events = ctx.payloads(EventType.SSH_AUTH_ATTEMPT)"
annotation = "ctx.payloads() returns just the payload dicts for one event type — handy for counting."

[[blocks]]
kind = "code"
target = "if len(auth_events) <= 5:"
annotation = "Threshold. 5 attempts is the gap between 'forgot my password' and 'walking a wordlist'."

[[blocks]]
kind = "code"
target = "    return None"
annotation = "Rule didn't fire. The worker tries the next rule."

[[blocks]]
kind = "choice"
prompt = "Why <= 5 and not < 5?"
options = [
  "Off-by-one. The author meant < 5",
  "A real human very rarely tries exactly 6 times — the threshold is calibrated for false-positive avoidance",
  "Because paramiko retries 5 times internally",
  "Random; any threshold would work",
]
correct = 1
explanation = "Calibration based on observed honest-user behavior. Threshold tuning is what makes detection rules useful instead of noisy."
