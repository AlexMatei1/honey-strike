id = "detect-victim-recon"
family = "defend"
title = "Detect victim host-info gathering (T1592)"
blurb = "Spot /.env probes and post-shell uname/whoami/id commands."
ttps = ["T1592"]
difficulty = "easy"
typing_model = "python"

briefing = """
**MITRE ATT&CK:** T1592 — *Gather Victim Host Information*

Attackers profile the host: which OS, which user, what's configured. Over
HTTP that's hitting info-disclosure paths (`/.env`, `/.git`,
`/server-status`, `/wp-config`, `/.aws/`). Over SSH it's `uname`, `whoami`,
`id`, `hostname`, or `cat /etc/os-release`.

Type the SSH branch using the `_HOST_INFO_CMD` regex. The fixture is an SSH
session running `whoami`, so it fires.
"""

reference_source_excerpt = """
_HOST_INFO_CMD = re.compile(
    r"\\b(?:uname|whoami|id|hostname|lsb_release|uptime|w\\b|who\\b|env\\b|printenv|"
    r"cat\\s+/etc/(?:passwd|os-release|hostname|issue))", re.I)

def _victim_host_info_rule(ctx):
    elif ctx.service == "ssh":
        for ev in ctx.events:
            if ev.get("event_type") != EventType.SSH_COMMAND.value:
                continue
            raw = (ev.get("payload") or {}).get("raw") or ""
            if _HOST_INFO_CMD.search(raw):
                return TTPMatch(technique_id="T1592", ...)
    return None
"""

