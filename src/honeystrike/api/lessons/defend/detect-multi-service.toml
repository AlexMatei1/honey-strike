id = "detect-multi-service"
family = "defend"
title = "Detect multi-service scanning (T1595.001)"
blurb = "Correlate sibling sessions from one IP to spot a port scanner."
ttps = ["T1595.001"]
difficulty = "medium"
typing_model = "python"

briefing = """
**MITRE ATT&CK:** T1595.001 — *Active Scanning: Scanning IP Blocks*

This is the first rule that looks **beyond a single session**. A scanner
touches many services from one IP in seconds. The rule walks
`ctx.sibling_sessions` (other sessions sharing the time window) and counts
the distinct services seen from the same `src_ip` within 60 s. Two or more
= scanning.

Type the correlation body. The fixture is an SSH session whose sibling
sessions include HTTP and FTP from the same IP seconds apart — so `seen`
reaches 3 and the rule fires.
"""

reference_source_excerpt = """
def _multi_service_scan_rule(ctx):
    if not ctx.sibling_sessions:
        return None
    seen = {ctx.service}
    for sess in ctx.sibling_sessions:
        if sess.get("src_ip") != ctx.src_ip:
            continue
        sess_started = sess.get("started_at")
        if abs((sess_started - ctx.started_at).total_seconds()) <= 60:
            seen.add(sess.get("service"))
    if len(seen) < 2:
        return None
    return TTPMatch(technique_id="T1595.001", ...)
"""

[fixture]
events_json = "multi-service-scan"
expected = true

